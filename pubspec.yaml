name: tadstech
description: "The Average Data Scientist (TADS) - Professional data science services and portfolio website built with Flutter."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.7.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  go_router: ^13.0.0
  responsive_framework: ^0.2.0
  flutter_animate: ^4.1.1+1
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  cupertino_icons: ^1.0.8

  # Data & Integration
  http: ^1.1.0
  url_launcher: ^6.2.0
  flutter_markdown_plus: ^1.0.3

  # Forms & Contact
  flutter_email_sender: ^7.0.0
  flutter_form_builder: ^10.0.1
  form_builder_validators: ^11.1.2
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/svgs/
    - assets/images/logo.png

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500